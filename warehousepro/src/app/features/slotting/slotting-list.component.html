<div class="container-fluid">
  <div class="row mb-4">
    <div class="col">
      <h2 class="fw-bold">Slotting Rules</h2>
      <p class="text-muted">Manage warehouse optimization rules</p>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <input type="text" class="form-control" placeholder="Search rules..." 
        [(ngModel)]="searchTerm" (input)="filterRules()">
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Criterion</th>
              <th>Priority</th>
              <th>Description</th>
              <th>Status</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let rule of filteredRules">
              <td><strong>{{ rule.ruleID }}</strong></td>
              <td>{{ rule.criterion }}</td>
              <td><span class="badge bg-primary">{{ rule.priority }}</span></td>
              <td>{{ rule.description || 'N/A' }}</td>
              <td>
                <span class="badge bg-success">{{ rule.status }}</span>
              </td>
              <td>{{ rule.createdAt | date:'short' }}</td>
            </tr>
            <tr *ngIf="filteredRules.length === 0">
              <td colspan="6" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                No slotting rules found
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
