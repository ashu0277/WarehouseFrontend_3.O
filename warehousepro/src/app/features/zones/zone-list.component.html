<div class="container-fluid">
  <div class="row mb-4">
    <div class="col">
      <h2 class="fw-bold">Zones</h2>
      <p class="text-muted">Manage warehouse zones</p>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary" (click)="openCreateModal()">
        <i class="bi bi-plus-circle me-2"></i>Add Zone
      </button>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <input type="text" class="form-control" placeholder="Search zones..." 
            [(ngModel)]="searchTerm" (input)="filterZones()">
        </div>
        <div class="col-md-4">
          <select class="form-select" [(ngModel)]="typeFilter" (change)="filterZones()">
            <option value="">All Types</option>
            <option value="Storage">Storage</option>
            <option value="Picking">Picking</option>
            <option value="Packing">Packing</option>
            <option value="Receiving">Receiving</option>
            <option value="Shipping">Shipping</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary w-100" (click)="resetFilters()">
            <i class="bi bi-x-circle me-2"></i>Reset
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Warehouse</th>
              <th>Type</th>
              <th>Total Bins</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let zone of filteredZones">
              <td><strong>{{ zone.zoneID }}</strong></td>
              <td>{{ zone.name }}</td>
              <td>{{ zone.warehouseName }}</td>
              <td><span class="badge bg-info">{{ zone.zoneType }}</span></td>
              <td>{{ zone.totalBins }}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1" (click)="openEditModal(zone)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="confirmDelete(zone)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="filteredZones.length === 0">
              <td colspan="6" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                No zones found
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Create/Edit Modal -->
<div class="modal" [class.show]="showModal" [style.display]="showModal ? 'block' : 'none'" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ isEditMode ? 'Edit' : 'Create' }} Zone</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="zoneForm">
          <div class="mb-3">
            <label class="form-label">Name *</label>
            <input type="text" class="form-control" formControlName="Name"
              [class.is-invalid]="zoneForm.get('Name')?.invalid && zoneForm.get('Name')?.touched">
            <div class="invalid-feedback">Name is required</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Zone Type *</label>
            <select class="form-select" formControlName="ZoneType"
              [class.is-invalid]="zoneForm.get('ZoneType')?.invalid && zoneForm.get('ZoneType')?.touched">
              <option value="Storage">Storage</option>
              <option value="Picking">Picking</option>
              <option value="Packing">Packing</option>
              <option value="Receiving">Receiving</option>
              <option value="Shipping">Shipping</option>
            </select>
            <div class="invalid-feedback">Zone type is required</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Warehouse ID *</label>
            <input type="number" class="form-control" formControlName="WarehouseID"
              [class.is-invalid]="zoneForm.get('WarehouseID')?.invalid && zoneForm.get('WarehouseID')?.touched">
            <div class="invalid-feedback">Warehouse ID is required</div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="saveZone()" [disabled]="zoneForm.invalid">
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="showModal" *ngIf="showModal"></div>

<app-confirm-dialog
  [show]="showDeleteDialog"
  title="Delete Zone"
  [message]="'Are you sure you want to delete ' + selectedZone?.name + '?'"
  confirmText="Delete"
  (confirmed)="deleteZone()"
  (cancelled)="showDeleteDialog = false">
</app-confirm-dialog>
